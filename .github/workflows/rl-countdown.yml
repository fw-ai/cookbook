name: RL Countdown

# Manual end-to-end run. It provisions Fireworks training and inference
# resources, so it intentionally does not run on pull_request.
on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Countdown prompt variant"
        required: true
        type: choice
        default: vision
        options:
          - vision
          - text
      base_model:
        description: "Fireworks base model"
        required: true
        type: string
        default: accounts/fireworks/models/qwen3-vl-8b-instruct
      tokenizer_model:
        description: "HuggingFace tokenizer model"
        required: true
        type: string
        default: Qwen/Qwen3-VL-8B-Instruct
      training_shape:
        description: "Training shape resource name or ID"
        required: true
        type: string
        default: accounts/fireworks/trainingShapes/qwen3-vl-8b-256k-h200-lora
      deployment_shape:
        description: "Deployment shape resource name or ID"
        required: true
        type: string
        default: accounts/fireworks/deploymentShapes/rft-qwen3-vl-8b-instruct
      lora_rank:
        description: "LoRA rank"
        required: true
        type: number
        default: 16
      max_rows:
        description: "Countdown rows to consume"
        required: true
        type: number
        default: 16
      epochs:
        description: "Dataset epochs"
        required: true
        type: number
        default: 1
      completions_per_prompt:
        description: "Samples per prompt group"
        required: true
        type: number
        default: 4
      prompt_groups_per_step:
        description: "Prompt groups per optimizer step"
        required: true
        type: number
        default: 2
      max_completion_tokens:
        description: "Maximum generated tokens per rollout"
        required: true
        type: number
        default: 1024
      max_concurrency_rollout_sample:
        description: "In-flight LLM-call cap"
        required: true
        type: number
        default: 8
      deployment_replica_count:
        description: "Optional fixed rollout deployment replica count"
        required: false
        type: string
        default: ""
      output_model_id:
        description: "Optional final promoted model ID"
        required: false
        type: string
        default: ""
      save_final_checkpoint:
        description: "Save a final trainer checkpoint"
        required: true
        type: boolean
        default: true
      cleanup:
        description: "Clean up SDK-created trainer/deployment resources"
        required: true
        type: boolean
        default: true
      require_positive_reward:
        description: "Fail if no positive Countdown reward is observed"
        required: true
        type: boolean
        default: true
      wandb_entity:
        description: "Optional W&B entity"
        required: false
        type: string
        default: ""
      wandb_project:
        description: "W&B project"
        required: false
        type: string
        default: grpo-countdown-public
      wandb_run_name:
        description: "Optional W&B run name"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: rl-countdown-${{ github.ref }}-${{ github.event.inputs.variant }}
  cancel-in-progress: false

jobs:
  countdown:
    name: Countdown ${{ inputs.variant }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    defaults:
      run:
        working-directory: training
    env:
      FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
      FIREWORKS_ACCOUNT_ID: ${{ secrets.FIREWORKS_ACCOUNT_ID }}
      FIREWORKS_BASE_URL: ${{ vars.FIREWORKS_BASE_URL || 'https://api.fireworks.ai' }}
      FIREWORKS_INFERENCE_URL: ${{ vars.FIREWORKS_INFERENCE_URL || vars.FIREWORKS_BASE_URL || 'https://api.fireworks.ai' }}
      FIREWORKS_HOTLOAD_API_URL: ${{ vars.FIREWORKS_HOTLOAD_API_URL || vars.FIREWORKS_BASE_URL || 'https://api.fireworks.ai' }}
      FIREWORKS_API_EXTRA_HEADERS_JSON: ${{ vars.FIREWORKS_API_EXTRA_HEADERS_JSON || '' }}
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      WANDB_ENTITY: ${{ inputs.wandb_entity }}
      WANDB_PROJECT: ${{ inputs.wandb_project }}
      PYTHONUNBUFFERED: "1"
      COOKBOOK_STATUS_FILE: rl_artifacts/status.json
      COOKBOOK_METADATA_FILE: rl_artifacts/metadata.json
      COOKBOOK_METRICS_FILE: rl_artifacts/metrics.jsonl
      COOKBOOK_OUTPUT_MODEL_PATH: rl_artifacts/output_model.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: training/pyproject.toml

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run Countdown
        run: |
          set -euo pipefail
          mkdir -p rl_artifacts

          args=(
            --variant "${{ inputs.variant }}"
            --base-model "${{ inputs.base_model }}"
            --tokenizer-model "${{ inputs.tokenizer_model }}"
            --training-shape "${{ inputs.training_shape }}"
            --deployment-shape "${{ inputs.deployment_shape }}"
            --lora-rank "${{ inputs.lora_rank }}"
            --max-rows "${{ inputs.max_rows }}"
            --epochs "${{ inputs.epochs }}"
            --completions-per-prompt "${{ inputs.completions_per_prompt }}"
            --prompt-groups-per-step "${{ inputs.prompt_groups_per_step }}"
            --max-completion-tokens "${{ inputs.max_completion_tokens }}"
            --max-concurrency-rollout-sample "${{ inputs.max_concurrency_rollout_sample }}"
            --save-final-checkpoint "${{ inputs.save_final_checkpoint }}"
            --cleanup "${{ inputs.cleanup }}"
            --require-positive-reward "${{ inputs.require_positive_reward }}"
            --wandb-entity "${{ inputs.wandb_entity }}"
            --wandb-project "${{ inputs.wandb_project }}"
          )

          if [[ -n "${{ inputs.deployment_replica_count }}" ]]; then
            args+=(--deployment-replica-count "${{ inputs.deployment_replica_count }}")
          fi
          if [[ -n "${{ inputs.output_model_id }}" ]]; then
            args+=(--output-model-id "${{ inputs.output_model_id }}")
          fi
          if [[ -n "${{ inputs.wandb_run_name }}" ]]; then
            args+=(--wandb-run-name "${{ inputs.wandb_run_name }}")
          fi

          python examples/rl/countdown/train.py "${args[@]}"

      - name: Summarize Countdown Metrics
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          metrics_path = Path(os.environ["COOKBOOK_METRICS_FILE"])
          status_path = Path(os.environ["COOKBOOK_STATUS_FILE"])
          metadata_path = Path(os.environ["COOKBOOK_METADATA_FILE"])
          output_model_path = Path(os.environ["COOKBOOK_OUTPUT_MODEL_PATH"])

          rows = []
          if metrics_path.exists():
              for line in metrics_path.read_text().splitlines():
                  try:
                      rows.append(json.loads(line))
                  except json.JSONDecodeError:
                      pass

          rewards = [
              float(row["rollout/reward"])
              for row in rows
              if isinstance(row.get("rollout/reward"), (int, float))
          ]
          accuracies = [
              float(row["rollout/accuracy"])
              for row in rows
              if isinstance(row.get("rollout/accuracy"), (int, float))
          ]

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as summary:
              summary.write("## Countdown RL summary\n\n")
              summary.write(f"- Variant: `${{ inputs.variant }}`\n")
              summary.write(f"- Base model: `${{ inputs.base_model }}`\n")
              summary.write(f"- Training shape: `${{ inputs.training_shape }}`\n")
              summary.write(f"- Metrics records: `{len(rows)}`\n")
              if rewards:
                  summary.write(f"- Max reward: `{max(rewards):.4f}`\n")
                  summary.write(f"- Final reward: `{rewards[-1]:.4f}`\n")
              if accuracies:
                  summary.write(f"- Max accuracy: `{max(accuracies):.4f}`\n")
                  summary.write(f"- Final accuracy: `{accuracies[-1]:.4f}`\n")
              for label, path in (
                  ("status", status_path),
                  ("metadata", metadata_path),
                  ("output model", output_model_path),
              ):
                  if path.exists():
                      summary.write(f"\n### {label}\n\n```json\n{path.read_text()}\n```\n")
          PY

      - name: Upload Countdown Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: countdown-${{ inputs.variant }}-${{ github.run_id }}
          path: training/rl_artifacts
          if-no-files-found: warn
