name: Training CI

on:
  workflow_call:
  pull_request:
    paths:
      - "training/**"
      - ".github/workflows/training-ci.yml"
  push:
    branches:
      - main
    paths:
      - "training/**"
      - ".github/workflows/training-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: training-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit And Import Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: training
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: training/pyproject.toml

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run Unit Tests
        run: |
          pytest -q tests/unit tests/test_smoke_imports.py examples/rl/frozen_lake/test_masking.py \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=json:coverage.json

      - name: Summarize Training Script Coverage
        run: |
          python tests/coverage_summary.py coverage.json \
            --fail-under 85 \
            --per-file-fail-under 75 \
            --fail-on-no-data | tee coverage-summary.txt

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-unit-coverage
          path: |
            training/coverage.xml
            training/coverage.json
            training/coverage-summary.txt

# Smoke matrix moved to .github/workflows/training-smoke.yml
# (nightly schedule + workflow_dispatch). PRs only run unit tests.
