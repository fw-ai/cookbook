name: Training CI

on:
  pull_request:
    paths:
      - "training/**"
      - ".github/workflows/training-ci.yml"
  push:
    branches:
      - main
    paths:
      - "training/**"
      - ".github/workflows/training-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: training-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit And Import Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: training
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: training/pyproject.toml

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run Unit Tests
        run: |
          pytest -q tests/unit tests/test_smoke_imports.py examples/rl/frozen_lake/test_masking.py \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=json:coverage.json

      - name: Summarize Training Script Coverage
        run: |
          python tests/coverage_summary.py coverage.json \
            --fail-under 85 \
            --per-file-fail-under 75 \
            --fail-on-no-data | tee coverage-summary.txt

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-unit-coverage
          path: |
            training/coverage.xml
            training/coverage.json
            training/coverage-summary.txt

  qwen3-8b-smoke:
    name: Qwen3-8B Smoke (${{ matrix.test_target }})
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        test_target:
          - tests/smoke_test/test_sft_smoke.py
          - tests/smoke_test/test_dpo_smoke.py
          - tests/smoke_test/test_grpo_smoke.py
    defaults:
      run:
        working-directory: training
    env:
      FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
      FIREWORKS_ACCOUNT_ID: ${{ secrets.FIREWORKS_ACCOUNT_ID }}
      FIREWORKS_BASE_URL: ${{ vars.FIREWORKS_BASE_URL || 'https://dev.api.fireworks.ai' }}
      FIREWORKS_INFERENCE_URL: ${{ vars.FIREWORKS_INFERENCE_URL || vars.FIREWORKS_BASE_URL || 'https://dev.api.fireworks.ai' }}
      FIREWORKS_HOTLOAD_API_URL: ${{ vars.FIREWORKS_HOTLOAD_API_URL || vars.FIREWORKS_BASE_URL || 'https://dev.api.fireworks.ai' }}
      FIREWORKS_GATEWAY_SECRET: ${{ secrets.FIREWORKS_GATEWAY_SECRET }}
      FIREWORKS_CUSTOM_IMAGE_TAG: ${{ vars.FIREWORKS_CUSTOM_IMAGE_TAG }}
      FIREWORKS_SMOKE_BASE_MODEL: ${{ vars.FIREWORKS_SMOKE_BASE_MODEL || 'accounts/fireworks/models/qwen3-8b' }}
      FIREWORKS_SMOKE_TOKENIZER_MODEL: ${{ vars.FIREWORKS_SMOKE_TOKENIZER_MODEL || 'Qwen/Qwen3-8B' }}
      FIREWORKS_SMOKE_TRAINING_SHAPE: ${{ vars.FIREWORKS_SMOKE_TRAINING_SHAPE || 'accounts/fireworks/trainingShapes/qwen3-8b-128k' }}
      FIREWORKS_SMOKE_REF_TRAINING_SHAPE: ${{ vars.FIREWORKS_SMOKE_REF_TRAINING_SHAPE || 'accounts/fireworks/trainingShapes/qwen3-8b-128k-forward-only' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: training/pyproject.toml

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run Smoke Test
        run: |
          pytest -q -s ${{ matrix.test_target }}

  frozen-lake-vl-e2e:
    name: Frozen Lake VL E2E
    if: ${{ vars.ENABLE_FROZEN_LAKE_VL_E2E == 'true' }}
    needs: qwen3-8b-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: training
    env:
      FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
      FIREWORKS_ACCOUNT_ID: ${{ secrets.FIREWORKS_ACCOUNT_ID }}
      FIREWORKS_BASE_URL: ${{ vars.FROZEN_LAKE_VL_BASE_URL || 'https://api.fireworks.ai' }}
      FIREWORKS_INFERENCE_URL: ${{ vars.FROZEN_LAKE_VL_INFERENCE_URL || vars.FROZEN_LAKE_VL_BASE_URL || 'https://api.fireworks.ai' }}
      FIREWORKS_HOTLOAD_API_URL: ${{ vars.FROZEN_LAKE_VL_HOTLOAD_API_URL || vars.FROZEN_LAKE_VL_BASE_URL || 'https://api.fireworks.ai' }}
      FIREWORKS_GATEWAY_SECRET: ${{ secrets.FIREWORKS_GATEWAY_SECRET }}
      FROZEN_LAKE_VL_BASE_MODEL: ${{ vars.FROZEN_LAKE_VL_BASE_MODEL || 'accounts/fireworks/models/qwen3-vl-8b-instruct' }}
      FROZEN_LAKE_VL_TOKENIZER_MODEL: ${{ vars.FROZEN_LAKE_VL_TOKENIZER_MODEL || 'Qwen/Qwen3-VL-8B-Instruct' }}
      FROZEN_LAKE_VL_TRAINING_SHAPE: ${{ vars.FROZEN_LAKE_VL_TRAINING_SHAPE || 'accounts/fireworks/trainingShapes/qwen3-vl-8b-65k' }}
      FROZEN_LAKE_VL_DEPLOYMENT_SHAPE: ${{ vars.FROZEN_LAKE_VL_DEPLOYMENT_SHAPE }}
      FROZEN_LAKE_VL_COMPLETIONS: ${{ vars.FROZEN_LAKE_VL_COMPLETIONS || '4' }}
      FROZEN_LAKE_VL_PROMPT_GROUPS: ${{ vars.FROZEN_LAKE_VL_PROMPT_GROUPS || '1' }}
      FROZEN_LAKE_VL_MAX_SEEDS: ${{ vars.FROZEN_LAKE_VL_MAX_SEEDS || '8' }}
      FROZEN_LAKE_VL_MAX_STEPS: ${{ vars.FROZEN_LAKE_VL_MAX_STEPS || '8' }}
      FROZEN_LAKE_VL_MAX_CONCURRENT: ${{ vars.FROZEN_LAKE_VL_MAX_CONCURRENT || '4' }}
      WANDB_MODE: disabled
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: training/pyproject.toml

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run Frozen Lake VL E2E
        run: |
          pytest -q -s tests/e2e/test_frozen_lake_vl_e2e.py
