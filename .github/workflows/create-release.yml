name: Create Release

on:
  pull_request:
    paths:
      - ".github/workflows/create-release.yml"
      - "training/**"
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cookbook-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sdk-compatibility-smoke:
    name: published SDK compatibility smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: training
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: training/pyproject.toml

      - name: Install cookbook with published dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest

      - name: Verify installed cookbook artifact
        working-directory: ${{ runner.temp }}
        run: python "${GITHUB_WORKSPACE}/training/tests/verify_installed_artifact.py"

      - name: Verify installed SDK compatibility
        run: |
          python -m pip check
          python -c 'from importlib.metadata import version; print("fireworks-ai", version("fireworks-ai"))'
          python -m pytest -q \
            tests/test_smoke_imports.py \
            tests/unit/test_client.py \
            tests/unit/test_sdk_compat.py \
            tests/unit/test_serverless.py \
            tests/unit/test_service.py

  release:
    name: create release
    if: github.event_name == 'push'
    needs: sdk-compatibility-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create cookbook release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          today="$(date -u +%Y.%m.%d)"
          latest="$(
            git tag --list "cookbook-v${today}.*" |
              sed -E "s/^cookbook-v${today}\\.([0-9]+)$/\\1/" |
              sort -n |
              tail -1
          )"
          next=$(( ${latest:-0} + 1 ))
          tag="cookbook-v${today}.${next}"

          gh release create "${tag}" \
            --target "${GITHUB_SHA}" \
            --title "${tag}" \
            --generate-notes
