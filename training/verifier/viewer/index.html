<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Renderer Verifier — Probe Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #fafafa;
      --fg: #1f1f1f;
      --fg-muted: #6a6a6a;
      --border: #e5e5e5;
      --border-strong: #cfcfcf;

      /* Provenance backgrounds (subtle pastels) */
      --prov-prompt: #eaf3fc;
      --prov-native: #e8f5ea;
      --prov-trailing: #fff2e0;
      --prov-diverged: #ffe8e8;

      /* Chunk-source left-borders */
      --chunk-bos: #8e24aa;
      --chunk-header: #5e35b1;
      --chunk-output: #2e7d32;
      --chunk-stopover: #ef6c00;
      --chunk-genprefix: #0277bd;

      /* Other accents */
      --special-fg: #c2185b;        /* tokens in tokenizer.special_tokens */
      --trainable-bar: #2e7d32;     /* renderer_claim_weight > 0 marker */
      --warn: #d84315;
    }
    body {
      margin: 0;
      font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--fg);
      background: var(--bg);
    }
    main {
      padding: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 { font-size: 18px; margin: 0 0 8px; }
    h2 { font-size: 14px; margin: 16px 0 6px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .file-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .file-row input[type=file] { font: inherit; }
    details { margin-bottom: 12px; }
    summary { cursor: pointer; font-weight: 600; padding: 4px 0; }
    .meta-grid {
      display: grid;
      grid-template-columns: max-content 1fr;
      column-gap: 12px;
      row-gap: 2px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
    }
    .meta-grid dt { color: var(--fg-muted); }
    .meta-grid dd { margin: 0; word-break: break-all; }
    .pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font: 12px/1.2 ui-monospace, "SF Mono", Menlo, monospace;
      border: 1px solid var(--border);
      background: var(--bg-soft);
      margin-right: 6px;
    }
    .pill.ok { background: var(--prov-native); border-color: #a5d6a7; }
    .pill.warn { background: var(--prov-trailing); border-color: #ffcc80; }
    .pill.fail { background: var(--prov-diverged); border-color: #ef9a9a; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      padding: 8px 10px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .legend-item { display: inline-flex; align-items: center; gap: 4px; }
    .swatch {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 2px;
      border: 1px solid var(--border-strong);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
      padding: 6px 10px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .filters label { display: inline-flex; align-items: center; gap: 4px; }

    /* The token stream itself */
    .stream {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .tok {
      display: inline;
      padding: 1px 1px 1px 3px;
      margin: 0 1px 0 0;
      border-left: 2px solid transparent;
      border-radius: 1px;
      cursor: default;
    }
    .tok.trainable { box-shadow: inset 0 -2px 0 var(--trainable-bar); }
    .tok.special { color: var(--special-fg); font-weight: 600; }
    .tok.diverged { outline: 1px dashed var(--warn); }

    .tok-newline {
      display: inline-block;
      color: var(--fg-muted);
      opacity: 0.55;
      padding-right: 1px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 16px;
      color: var(--fg-muted);
      border: 1px dashed var(--border-strong);
      border-radius: 6px;
    }

    .table-compact { border-collapse: collapse; font-size: 12px; }
    .table-compact th, .table-compact td {
      border: 1px solid var(--border);
      padding: 2px 6px;
      text-align: left;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    .table-compact th { background: var(--bg-soft); color: var(--fg-muted); font-weight: 600; }

    .footer { margin-top: 24px; color: var(--fg-muted); font-size: 11px; }

    /* Live probe form */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 12px;
      align-items: start;
    }
    .form-grid label {
      display: flex;
      flex-direction: column;
      font-size: 12px;
      font-weight: 600;
      gap: 2px;
    }
    .form-grid label.span-2 { grid-column: span 2; }
    .form-grid input,
    .form-grid select,
    .form-grid textarea {
      font: 12px ui-monospace, "SF Mono", Menlo, monospace;
      padding: 4px 6px;
      border: 1px solid var(--border-strong);
      border-radius: 3px;
      background: var(--bg);
      color: var(--fg);
    }
    .form-grid textarea { resize: vertical; min-height: 28px; }
    .form-grid fieldset {
      grid-column: span 2;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
    }
    .form-grid legend { font-size: 12px; color: var(--fg-muted); padding: 0 4px; }
    .form-grid .span-2 { grid-column: span 2; }
    .msg-row {
      display: grid;
      grid-template-columns: max-content 1fr max-content;
      gap: 6px;
      margin-bottom: 4px;
      align-items: start;
    }
    .btn-primary {
      background: #1976d2;
      color: #fff;
      border: 1px solid #1565c0;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary:disabled { background: #90caf9; border-color: #90caf9; cursor: wait; }
    .btn-icon {
      background: transparent;
      color: var(--fg-muted);
      border: 1px solid var(--border-strong);
      padding: 0 6px;
      border-radius: 3px;
      cursor: pointer;
    }
    .error-banner {
      padding: 8px 12px;
      background: var(--prov-diverged);
      border: 1px solid #ef9a9a;
      border-radius: 4px;
      color: #b71c1c;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <main id="root"></main>

  <script type="text/babel">
    const { useState, useMemo, useCallback } = React;

    /* ----------------------------------------------------------------- */
    /* Constants                                                          */
    /* ----------------------------------------------------------------- */

    const PROV_BG = {
      prompt_hard_append:   "var(--prov-prompt)",
      native_generated:     "var(--prov-native)",
      trailing_hard_append: "var(--prov-trailing)",
      tokenization_diverged:"var(--prov-diverged)",
    };

    const CHUNK_BORDER = {
      bos:               "var(--chunk-bos)",
      header:            "var(--chunk-header)",
      output:            "var(--chunk-output)",
      stop_overlap:      "var(--chunk-stopover)",
      generation_suffix: "var(--chunk-genprefix)",
    };

    const PROVENANCES = [
      "prompt_hard_append",
      "native_generated",
      "trailing_hard_append",
      "tokenization_diverged",
    ];

    /* Prefilled (renderer → tokenizer) for the live form. The user can
       still edit either field; this is just the convenience default. */
    const RENDERER_TOKENIZER_DEFAULTS = {
      glm5: "zai-org/GLM-5.1",
      qwen3: "Qwen/Qwen3-8B",
      qwen3_disable_thinking: "Qwen/Qwen3-8B",
      kimi_k25: "moonshotai/Kimi-K2.5",
      kimi_k25_disable_thinking: "moonshotai/Kimi-K2.5",
      deepseekv3: "deepseek-ai/DeepSeek-V3",
      deepseekv3_thinking: "deepseek-ai/DeepSeek-V3",
      deepseekv3_disable_thinking: "deepseek-ai/DeepSeek-V3",
      minimax_m2: "MiniMaxAI/MiniMax-M2",
      llama3: "meta-llama/Llama-3.3-70B-Instruct",
    };

    /* ----------------------------------------------------------------- */
    /* Helpers                                                            */
    /* ----------------------------------------------------------------- */

    /** Split a decoded string into segments so newlines render as visible
     * line breaks while keeping the token boundary visible. */
    function renderDecoded(decoded) {
      if (decoded == null) return null;
      const out = [];
      const lines = decoded.split("\n");
      lines.forEach((line, i) => {
        if (i > 0) {
          out.push(<span className="tok-newline" key={`nl-${i}`}>⏎</span>);
          out.push(<br key={`br-${i}`} />);
        }
        if (line.length > 0) {
          out.push(<span key={`t-${i}`}>{line}</span>);
        }
      });
      return out;
    }

    function pillStatus(value) {
      if (value === true) return "ok";
      if (value === false) return "fail";
      return "";
    }

    /* ----------------------------------------------------------------- */
    /* Components                                                         */
    /* ----------------------------------------------------------------- */

    function LiveProbeForm({ onArtifact, onError, busy, setBusy }) {
      const [renderer, setRenderer] = useState("glm5");
      const [tokenizerModel, setTokenizerModel] = useState(RENDERER_TOKENIZER_DEFAULTS.glm5);
      const [model, setModel] = useState("");
      const [deploymentId, setDeploymentId] = useState("");
      const [maxTokens, setMaxTokens] = useState(1024);
      const [temperature, setTemperature] = useState(0.0);
      const [trainOnWhat, setTrainOnWhat] = useState("last_assistant_turn");
      const [messages, setMessages] = useState([
        { role: "system", content: "Answer with a single integer and nothing else." },
        { role: "user",   content: "2 + 2 = ?" },
      ]);
      const [tools, setTools] = useState("");

      const onRendererChange = (e) => {
        const v = e.target.value;
        setRenderer(v);
        const tok = RENDERER_TOKENIZER_DEFAULTS[v];
        if (tok) setTokenizerModel(tok);
      };

      const updateMessage = (i, patch) =>
        setMessages((prev) => prev.map((m, idx) => (idx === i ? { ...m, ...patch } : m)));
      const removeMessage = (i) =>
        setMessages((prev) => prev.filter((_, idx) => idx !== i));
      const addMessage = (role) =>
        setMessages((prev) => [...prev, { role, content: "" }]);

      const dispatchPreview = useMemo(() => {
        if (model && deploymentId) return "ERROR: pass at most one of `model` and `deployment_id`";
        if (deploymentId) return `mode=deployment  →  accounts/<account>/deployments/${deploymentId}`;
        if (model) return `mode=explicit  →  ${model}`;
        const def = RENDERER_TOKENIZER_DEFAULTS[renderer];
        return `mode=serverless  →  default for renderer=${renderer}` +
          (def ? "" : "  (NOTE: no registered serverless default — will error)");
      }, [renderer, model, deploymentId]);

      const onSubmit = useCallback(async (e) => {
        e.preventDefault();
        if (busy) return;

        let toolsParsed = [];
        if (tools.trim()) {
          try {
            toolsParsed = JSON.parse(tools);
            if (!Array.isArray(toolsParsed)) throw new Error("must be a JSON array");
          } catch (err) {
            onError(`Tools field is not a JSON array: ${err.message}`);
            return;
          }
        }

        setBusy(true);
        try {
          const res = await fetch("/probe", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              renderer,
              tokenizer_model: tokenizerModel,
              model: model.trim() || null,
              deployment_id: deploymentId.trim() || null,
              messages,
              tools: toolsParsed,
              max_tokens: Number(maxTokens),
              temperature: Number(temperature),
              train_on_what: trainOnWhat,
            }),
          });
          const data = await res.json();
          if (!res.ok || data.error) {
            onError(data.error || `HTTP ${res.status}`);
            return;
          }
          onArtifact(data, "live");
        } catch (err) {
          onError(`fetch failed: ${err.message}`);
        } finally {
          setBusy(false);
        }
      }, [
        busy, renderer, tokenizerModel, model, deploymentId,
        messages, tools, maxTokens, temperature, trainOnWhat,
        onArtifact, onError, setBusy,
      ]);

      return (
        <details open>
          <summary>Live probe — form input</summary>
          <form onSubmit={onSubmit} className="form-grid">
            <label>renderer
              <input value={renderer} onChange={onRendererChange} list="renderers" />
              <datalist id="renderers">
                {Object.keys(RENDERER_TOKENIZER_DEFAULTS).map((r) => <option key={r} value={r} />)}
              </datalist>
            </label>
            <label>tokenizer_model
              <input value={tokenizerModel} onChange={(e) => setTokenizerModel(e.target.value)} />
            </label>
            <label>model <span style={{ color: "var(--fg-muted)", fontWeight: "normal" }}>(optional, mutually exclusive with deployment_id)</span>
              <input value={model} placeholder="(blank → serverless default)" onChange={(e) => setModel(e.target.value)} />
            </label>
            <label>deployment_id <span style={{ color: "var(--fg-muted)", fontWeight: "normal" }}>(optional)</span>
              <input value={deploymentId} placeholder="(blank → serverless default)" onChange={(e) => setDeploymentId(e.target.value)} />
            </label>
            <label>max_tokens
              <input type="number" min="1" step="1" value={maxTokens} onChange={(e) => setMaxTokens(e.target.value)} />
            </label>
            <label>temperature
              <input type="number" min="0" max="2" step="0.05" value={temperature} onChange={(e) => setTemperature(e.target.value)} />
            </label>
            <label>train_on_what
              <select value={trainOnWhat} onChange={(e) => setTrainOnWhat(e.target.value)}>
                <option value="last_assistant_message">last_assistant_message</option>
                <option value="last_assistant_turn">last_assistant_turn</option>
                <option value="all_assistant_messages">all_assistant_messages</option>
                <option value="all_messages">all_messages</option>
                <option value="all_tokens">all_tokens</option>
              </select>
            </label>
            <label className="span-2">tools <span style={{ color: "var(--fg-muted)", fontWeight: "normal" }}>(optional, JSON array)</span>
              <textarea rows="2" value={tools} onChange={(e) => setTools(e.target.value)} placeholder="[]" />
            </label>

            <div className="span-2">
              <div style={{ color: "var(--fg-muted)", marginTop: 4, marginBottom: 4 }}>
                <strong>Dispatch preview:</strong> <code>{dispatchPreview}</code>
              </div>
              <div style={{
                padding: "6px 8px",
                background: "var(--bg-soft)",
                border: "1px solid var(--border)",
                borderRadius: 4,
                fontSize: 11, color: "var(--fg-muted)",
              }}>
                The probe always sends <code>echo=true</code>, <code>raw_output=true</code>,
                {" "}<code>return_token_ids=true</code> to the gateway. They are needed for
                token-id ground truth and are recorded verbatim in the artifact.
              </div>
            </div>

            <fieldset className="span-2">
              <legend>messages</legend>
              {messages.map((m, i) => (
                <div key={i} className="msg-row">
                  <select value={m.role} onChange={(e) => updateMessage(i, { role: e.target.value })}>
                    <option value="system">system</option>
                    <option value="user">user</option>
                    <option value="assistant">assistant</option>
                    <option value="tool">tool</option>
                  </select>
                  <textarea
                    rows="2"
                    value={m.content}
                    onChange={(e) => updateMessage(i, { content: e.target.value })}
                  />
                  <button type="button" className="btn-icon" onClick={() => removeMessage(i)} title="remove this message">×</button>
                </div>
              ))}
              <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
                <button type="button" onClick={() => addMessage("user")}>+ user</button>
                <button type="button" onClick={() => addMessage("assistant")}>+ assistant</button>
                <button type="button" onClick={() => addMessage("system")}>+ system</button>
                <button type="button" onClick={() => addMessage("tool")}>+ tool</button>
              </div>
            </fieldset>

            <div className="span-2" style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 4 }}>
              <button type="submit" disabled={busy} className="btn-primary">
                {busy ? "Running probe…" : "Run probe"}
              </button>
              <span style={{ color: "var(--fg-muted)", fontSize: 12 }}>
                Submits to <code>/probe</code> on the local server, runs <code>run_probe</code>
                with these inputs, returns the same JSON the CLI writes.
              </span>
            </div>
          </form>
        </details>
      );
    }

    function FilePicker({ onLoad }) {
      const handleChange = useCallback((e) => {
        const f = e.target.files && e.target.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = (ev) => {
          try {
            const a = JSON.parse(ev.target.result);
            onLoad(a, f.name);
          } catch (err) {
            alert("Could not parse JSON: " + err.message);
          }
        };
        r.readAsText(f);
      }, [onLoad]);

      const handleDrop = useCallback((e) => {
        e.preventDefault();
        const f = e.dataTransfer.files && e.dataTransfer.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = (ev) => {
          try {
            const a = JSON.parse(ev.target.result);
            onLoad(a, f.name);
          } catch (err) {
            alert("Could not parse JSON: " + err.message);
          }
        };
        r.readAsText(f);
      }, [onLoad]);

      return (
        <div className="file-row" onDragOver={(e) => e.preventDefault()} onDrop={handleDrop}>
          <input type="file" accept=".json,application/json" onChange={handleChange} />
          <span style={{ color: "var(--fg-muted)", fontSize: 12 }}>
            …or drop a probe JSON onto this row.
          </span>
        </div>
      );
    }

    function Header({ artifact, fileName }) {
      return (
        <details open>
          <summary>{fileName ? `Probe: ${fileName}` : "Probe metadata"}</summary>
          <dl className="meta-grid">
            <dt>schema_version</dt><dd>{artifact.schema_version}</dd>
            <dt>kind</dt><dd>{artifact.kind}</dd>
            <dt>produced_at</dt><dd>{artifact.produced_at}</dd>
            <dt>tokenizer</dt><dd>{(artifact.tokenizer || {}).model || "—"}</dd>
          </dl>
        </details>
      );
    }

    function RendererArgs({ artifact }) {
      const r = artifact.renderer || {};
      const cfg = r.config || {};
      const cfgKeys = Object.keys(cfg);
      return (
        <details open>
          <summary>Renderer args</summary>
          <table className="table-compact">
            <tbody>
              <tr><td>name</td><td><code>{r.name}</code></td></tr>
              <tr><td>train_on_what</td><td><code>{r.train_on_what}</code></td></tr>
              {cfgKeys.length === 0 ? (
                <tr><td>config</td><td style={{ color: "var(--fg-muted)" }}>(default — no overrides)</td></tr>
              ) : cfgKeys.map((k) => (
                <tr key={k}>
                  <td>config.{k}</td>
                  <td><code>{JSON.stringify(cfg[k])}</code></td>
                </tr>
              ))}
            </tbody>
          </table>
        </details>
      );
    }

    function DeploymentArgs({ artifact }) {
      const d = artifact.deployment || {};
      const sampling = d.sampling || {};
      const flags = d.api_flags || {};
      const extra = d.extra_completion_kwargs || {};
      const tools = ((artifact.input || {}).tools) || [];

      const modePill = ({
        serverless: "ok",
        deployment: "ok",
        explicit: "warn",
      }[d.mode]) || "";

      return (
        <details open>
          <summary>Deployment / API args</summary>
          <table className="table-compact">
            <tbody>
              <tr>
                <td>mode</td>
                <td>{d.mode ? <span className={`pill ${modePill}`}>{d.mode}</span> : "—"}</td>
              </tr>
              <tr><td>model</td><td><code>{d.model}</code></td></tr>
              {d.deployment_id ? (
                <tr><td>deployment_id</td><td><code>{d.deployment_id}</code></td></tr>
              ) : null}
              <tr><td>sampling.temperature</td><td><code>{String(sampling.temperature ?? "—")}</code></td></tr>
              <tr><td>sampling.max_tokens</td><td><code>{String(sampling.max_tokens ?? "—")}</code></td></tr>
              {Object.entries(flags).map(([k, v]) => (
                <tr key={`f-${k}`}>
                  <td>api_flags.{k}</td>
                  <td><span className={`pill ${v === true ? "ok" : ""}`}>{String(v)}</span></td>
                </tr>
              ))}
              {Object.keys(extra).length > 0 && Object.entries(extra).map(([k, v]) => (
                <tr key={`x-${k}`}>
                  <td>extra.{k}</td>
                  <td><code>{JSON.stringify(v)}</code></td>
                </tr>
              ))}
              <tr>
                <td>tools</td>
                <td>{tools.length === 0 ? <span style={{ color: "var(--fg-muted)" }}>none</span> : <code>{tools.length} declared</code>}</td>
              </tr>
            </tbody>
          </table>
        </details>
      );
    }

    function Sanity({ sanity }) {
      if (!sanity) return null;
      const keys = [
        "renderer_prompt_matches_api_prompt",
        "full_render_prompt_prefix_matches_api",
        "renderer_prompt_len",
        "api_prompt_len",
        "tokenization_diverged_count",
        "echo_prompt_stripped",
        "parse_response_ok",
        "structural_walk_token_match",
        "completion_token_count",
        "completion_stop_reason",
      ];
      return (
        <details open>
          <summary>Sanity flags</summary>
          <table className="table-compact">
            <tbody>
              {keys.filter((k) => k in sanity).map((k) => {
                const v = sanity[k];
                const pill = typeof v === "boolean" ? pillStatus(v) : "";
                return (
                  <tr key={k}>
                    <td>{k}</td>
                    <td>
                      {pill ? <span className={`pill ${pill}`}>{String(v)}</span> : <code>{String(v)}</code>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </details>
      );
    }

    function Counts({ rows }) {
      const counts = useMemo(() => {
        const acc = { provenance: {}, chunk: {} };
        for (const r of rows) {
          acc.provenance[r.provenance || "?"] = (acc.provenance[r.provenance || "?"] || 0) + 1;
          acc.chunk[r.chunk_source || "?"] = (acc.chunk[r.chunk_source || "?"] || 0) + 1;
        }
        return acc;
      }, [rows]);
      return (
        <details open>
          <summary>Counts</summary>
          <div style={{ display: "flex", gap: 24, flexWrap: "wrap" }}>
            <div>
              <div style={{ color: "var(--fg-muted)", fontSize: 11, marginBottom: 4 }}>by provenance</div>
              {Object.entries(counts.provenance).map(([k, v]) => (
                <span key={k} className="pill" style={{ background: PROV_BG[k] || "var(--bg-soft)" }}>
                  {k}: {v}
                </span>
              ))}
            </div>
            <div>
              <div style={{ color: "var(--fg-muted)", fontSize: 11, marginBottom: 4 }}>by chunk_source</div>
              {Object.entries(counts.chunk).map(([k, v]) => (
                <span
                  key={k}
                  className="pill"
                  style={{ borderLeft: `4px solid ${CHUNK_BORDER[k] || "var(--border-strong)"}` }}
                >
                  {k}: {v}
                </span>
              ))}
            </div>
          </div>
        </details>
      );
    }

    function Legend() {
      return (
        <div className="legend">
          <span className="legend-item"><span className="swatch" style={{ background: "var(--prov-prompt)" }} /> prompt_hard_append</span>
          <span className="legend-item"><span className="swatch" style={{ background: "var(--prov-native)" }} /> native_generated</span>
          <span className="legend-item"><span className="swatch" style={{ background: "var(--prov-trailing)" }} /> trailing_hard_append</span>
          <span className="legend-item"><span className="swatch" style={{ background: "var(--prov-diverged)" }} /> tokenization_diverged</span>
          <span style={{ marginLeft: 8 }}>•</span>
          <span className="legend-item">
            <span className="swatch" style={{ background: "var(--bg)", borderLeft: "3px solid var(--chunk-output)" }} />
            chunk_source = output (left border colour-codes the chunk)
          </span>
          <span style={{ marginLeft: 8 }}>•</span>
          <span className="legend-item">
            <span className="swatch" style={{ background: "var(--bg)", boxShadow: "inset 0 -2px 0 var(--trainable-bar)" }} />
            renderer_claim_weight &gt; 0 (trainable)
          </span>
          <span style={{ marginLeft: 8 }}>•</span>
          <span className="legend-item">
            <span style={{ color: "var(--special-fg)", fontWeight: 600, fontFamily: "ui-monospace,Menlo,monospace" }}>&lt;|special|&gt;</span>
            in tokenizer.special_tokens
          </span>
        </div>
      );
    }

    function Filters({ enabled, setEnabled }) {
      const toggle = (k) =>
        setEnabled((prev) => ({ ...prev, [k]: !prev[k] }));
      return (
        <div className="filters">
          <strong style={{ marginRight: 8 }}>Show:</strong>
          {PROVENANCES.map((p) => (
            <label key={p}>
              <input type="checkbox" checked={!!enabled[p]} onChange={() => toggle(p)} />
              {p}
            </label>
          ))}
          <span style={{ marginLeft: 8 }}>|</span>
          <label>
            <input type="checkbox" checked={!!enabled.onlyTrainable} onChange={() => toggle("onlyTrainable")} />
            only trainable (w&gt;0)
          </label>
          <label>
            <input type="checkbox" checked={!!enabled.onlySpecial} onChange={() => toggle("onlySpecial")} />
            only special tokens
          </label>
        </div>
      );
    }

    function Token({ row, isSpecial }) {
      const trainable = (row.renderer_claim_weight || 0) > 0.5;
      const bg = PROV_BG[row.provenance] || "var(--bg-soft)";
      const borderColor = CHUNK_BORDER[row.chunk_source] || "var(--border-strong)";

      const cls = [
        "tok",
        trainable ? "trainable" : "",
        isSpecial ? "special" : "",
        row.provenance === "tokenization_diverged" ? "diverged" : "",
      ].filter(Boolean).join(" ");

      const tip = [
        `idx=${row.idx}`,
        `tok=${row.token_id}`,
        `decoded=${JSON.stringify(row.decoded)}`,
        `chunk=${row.chunk_source}`,
        `role=${row.role || "-"}`,
        `weight=${row.renderer_claim_weight}`,
        `prov=${row.provenance}`,
        `msg_idx=${row.msg_idx}`,
      ].join("\n");

      return (
        <span
          className={cls}
          title={tip}
          style={{
            backgroundColor: bg,
            borderLeftColor: borderColor,
          }}
        >
          {renderDecoded(row.decoded)}
        </span>
      );
    }

    function TokenStream({ artifact, filters }) {
      const specialIds = useMemo(() => {
        const ids = new Set();
        const map = (artifact.tokenizer && artifact.tokenizer.special_tokens) || {};
        for (const k of Object.keys(map)) ids.add(Number(k));
        return ids;
      }, [artifact]);

      const rows = artifact.audit_table || [];
      const filtered = useMemo(() => {
        return rows.filter((r) => {
          if (!filters[r.provenance]) return false;
          if (filters.onlyTrainable && !((r.renderer_claim_weight || 0) > 0.5)) return false;
          if (filters.onlySpecial && !specialIds.has(r.token_id)) return false;
          return true;
        });
      }, [rows, filters, specialIds]);

      if (rows.length === 0) {
        return <div className="empty-state">No audit_table rows in this artifact.</div>;
      }

      return (
        <div className="stream">
          {filtered.map((row) => (
            <Token key={row.idx} row={row} isSpecial={specialIds.has(row.token_id)} />
          ))}
        </div>
      );
    }

    function App() {
      const [artifact, setArtifact] = useState(null);
      const [fileName, setFileName] = useState(null);
      const [busy, setBusy] = useState(false);
      const [error, setError] = useState(null);
      const [filters, setFilters] = useState({
        prompt_hard_append: true,
        native_generated: true,
        trailing_hard_append: true,
        tokenization_diverged: true,
        onlyTrainable: false,
        onlySpecial: false,
      });

      const handleArtifact = useCallback((a, source) => {
        setArtifact(a);
        setFileName(source === "live" ? `live (${a?.renderer?.name || "?"})` : source);
        setError(null);
      }, []);
      const handleError = useCallback((msg) => {
        setError(msg);
      }, []);

      return (
        <>
          <h1>Renderer Verifier — Probe Viewer</h1>

          <LiveProbeForm
            onArtifact={handleArtifact}
            onError={handleError}
            busy={busy}
            setBusy={setBusy}
          />

          <details>
            <summary>Or load an existing probe JSON artifact</summary>
            <FilePicker onLoad={(a, n) => handleArtifact(a, n)} />
          </details>

          {error && <div className="error-banner">{error}</div>}

          {artifact == null ? (
            <div className="empty-state">
              Type messages in the form above and click <strong>Run probe</strong>,
              or load a JSON artifact produced by{" "}
              <code>python -m training.verifier render</code>.
            </div>
          ) : (
            <>
              <Header artifact={artifact} fileName={fileName} />
              <RendererArgs artifact={artifact} />
              <DeploymentArgs artifact={artifact} />
              <Sanity sanity={artifact.sanity} />
              <Counts rows={artifact.audit_table || []} />
              <h2>Token stream</h2>
              <Legend />
              <Filters enabled={filters} setEnabled={setFilters} />
              <TokenStream artifact={artifact} filters={filters} />
            </>
          )}
          <div className="footer">
            Hover any token to see its full audit row. Background = provenance,
            left border colour = chunk_source, underline = trainable
            (renderer_claim_weight &gt; 0), magenta + bold = token id is in
            tokenizer.special_tokens. Live form posts to <code>/probe</code>
            on this server (<code>python -m training.verifier.serve</code>).
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
